version: "2"
run:
  go: "1.22"
  tests: true
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gocritic
    - govet
    - ineffassign
    - misspell
    - nilerr
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (io.WriteCloser).Close
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
    gocritic:
      disabled-checks:
        - ifElseChain
        - hugeParam
        - rangeValCopy
      enabled-tags:
        - diagnostic
        - performance
        - style
    revive:
      severity: warning
      rules:
        - name: var-naming
        - name: errorf
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: unreachable-code
        - name: redefines-builtin-id
    staticcheck:
      # ST1000 (package-level doc) intentionally disabled to match the v1
      # behavior: stylecheck was not enabled in v1, and exported-doc hygiene
      # is tracked separately (see the revive rules comment about `exported`).
      checks:
        - all
        - -ST1000
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - gocritic
          - prealloc
        path: _test\.go
      - linters:
          - errcheck
          - gocritic
          - revive
        path: test/fixtures/
      - linters:
          - revive
        path: cmd/
        text: exported
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/0xmhha/cli-wrapper
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
