name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: Signed-off-by trailer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR commits
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify each commit has a matching Signed-off-by trailer
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          echo "Checking commits in range ${BASE_SHA}..${HEAD_SHA}"

          commits=$(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")
          if [ -z "$commits" ]; then
            echo "No non-merge commits to check."
            exit 0
          fi

          failed=0
          while IFS= read -r sha; do
            subject=$(git log -1 --format='%s' "$sha")
            author_name=$(git log -1 --format='%an' "$sha")
            author_email=$(git log -1 --format='%ae' "$sha")
            signoffs=$(git log -1 --format='%(trailers:key=Signed-off-by,valueonly)' "$sha")

            expected="${author_name} <${author_email}>"

            if [ -z "$signoffs" ]; then
              printf '::error::Commit %s is missing a Signed-off-by trailer.\n' "$sha"
              printf '          Subject:  %s\n' "$subject"
              printf '          Expected: Signed-off-by: %s\n' "$expected"
              printf '          Fix with: git commit --amend -s --no-edit\n'
              failed=1
              continue
            fi

            match=0
            while IFS= read -r line; do
              trimmed=$(printf '%s' "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
              if [ "$trimmed" = "$expected" ]; then
                match=1
                break
              fi
            done <<< "$signoffs"

            if [ "$match" -ne 1 ]; then
              printf '::error::Commit %s has a Signed-off-by trailer that does not match the author.\n' "$sha"
              printf '          Subject: %s\n' "$subject"
              printf '          Author:  %s\n' "$expected"
              printf '          Found:   %s\n' "$signoffs"
              failed=1
            fi
          done <<< "$commits"

          if [ "$failed" -ne 0 ]; then
            echo ""
            echo "DCO check failed. See CONTRIBUTING.md for how to sign off your commits."
            exit 1
          fi

          echo "All commits carry a valid DCO sign-off."
