name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.22.x', '1.23.x']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      # go test ./... runs integration tests transitively, which shell out to
      # binaries under test/fixtures/bin/. Build them here so those tests see
      # real children instead of failing with exec-not-found. Without this,
      # tests that wait for StateRunning (logs, etc.) silently time out while
      # tests that wait for StateCrashed "accidentally" pass because the
      # exec error transitions the controller straight to Crashed.
      - name: Fixtures
        run: make fixtures

      - name: Unit tests
        run: go test -race -count=1 ./...

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: true
      - name: Fixtures
        run: make fixtures
      - name: Integration
        run: make integration

  chaos:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: true
      - name: Chaos
        run: make chaos

  fuzz:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'
          cache: true
      - name: Fuzz short
        run: make fuzz-short
