name: Bench

# Runs the standalone (untagged) benchmark suite on every push to main and
# every PR. Output is uploaded as an artifact so reviewers can compare
# against baseline runs locally with benchstat. PTY-mode benchmarks
# (//go:build bench) are NOT run here — they're slower and noisier on
# shared CI runners. Run `make bench-pty` locally for the full suite.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23.x'
          cache: true

      - name: Bench (default, untagged)
        run: |
          go test -run=^$ -bench=. -benchtime=2s -count=5 ./test/bench/... | tee bench-output.txt

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: bench-output
          path: bench-output.txt
          retention-days: 30
