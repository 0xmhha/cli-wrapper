name: Release

on:
  push:
    tags:
      - "v*"

# Minimum permissions needed by GoReleaser to publish a GitHub Release.
permissions:
  contents: write

jobs:
  goreleaser:
    name: Build & release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # GoReleaser needs the full history to build a changelog
          # against the previous tag.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
