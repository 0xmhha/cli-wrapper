name: Bug report
description: Report a reproducible bug or regression in cli-wrapper
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in as much
        of the template as you can — reproductions are the single biggest factor
        in how fast a bug gets fixed.

        For security issues, **do not file a public issue**.
        See [SECURITY.md](../blob/main/SECURITY.md) instead.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I can reproduce this on the latest `main` (or I am reporting against a tagged release and will note it below)
          required: true
        - label: This is not a security issue (those go to SECURITY.md)
          required: true

  - type: input
    id: version
    attributes:
      label: cli-wrapper version / commit
      description: "Output of `cliwrap version`, or a commit hash if built from source"
      placeholder: "e.g. v0.1.0 or commit 74d8708"
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: "Output of `go version`"
      placeholder: "e.g. go1.22.5 darwin/arm64"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (please specify distro and kernel in "Additional context")
        - macOS
        - Other (not officially supported)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and the observed behavior.
      placeholder: "When I ..., cliwrap ..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        The smallest config file, command sequence, or Go snippet that
        reproduces the problem. If it involves a child process, please
        include the child command too.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Run with `runtime.debug: verbose` or `trace` if possible.
        Please redact anything sensitive before pasting.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "Kernel version, container runtime, sandbox provider in use, anything else."
